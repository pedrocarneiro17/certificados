<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificados A1</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #f6f8fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border: 1px solid #d8dde6;
      border-radius: 10px;
      padding: 32px 28px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .brand-icon {
      width: 34px; height: 34px;
      background: #0969da;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .brand-text h1 {
      font-size: 0.95rem;
      font-weight: 700;
      color: #0d1117;
    }

    .brand-text p {
      font-size: 0.75rem;
      color: #768390;
      margin-top: 1px;
    }

    .divider {
      height: 1px;
      background: #e8ebf0;
      margin-bottom: 22px;
    }

    .field { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #444c56;
      margin-bottom: 5px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      height: 32px;
      padding: 0 10px;
      border: 1px solid #d8dde6;
      border-radius: 6px;
      font-size: 0.85rem;
      color: #0d1117;
      background: #f6f8fa;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }

    input:focus {
      border-color: #0969da;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(9,105,218,.12);
    }

    .btn {
      width: 100%;
      height: 34px;
      background: #0969da;
      color: #fff;
      border: 1px solid rgba(0,0,0,.15);
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: background .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn:hover    { background: #0860ca; }
    .btn:disabled { opacity: .6; cursor: default; }

    .error {
      background: #ffebe9;
      border: 1px solid #ff8182;
      color: #cf222e;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 0.8rem;
      margin-top: 12px;
      display: none;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1>Certificados A1</h1>
        <p>Gestão de certificados digitais</p>
      </div>
    </div>

    <div class="divider"></div>

    <div class="field">
      <label for="username">Usuário</label>
      <input type="text" id="username" placeholder="Digite o usuário" autocomplete="username" />
    </div>

    <div class="field">
      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="Digite a senha" autocomplete="current-password" />
    </div>

    <button class="btn" id="btnLogin">
      Entrar
    </button>

    <div class="error" id="error">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="errorMsg"></span>
    </div>
  </div>

  <script>
    const btn   = document.getElementById('btnLogin');
    const errEl = document.getElementById('error');
    const msgEl = document.getElementById('errorMsg');

    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) return;

      btn.disabled    = true;
      btn.textContent = 'Entrando…';
      errEl.style.display = 'none';

      try {
        const res  = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (data.success) {
          location.href = '/';
        } else {
          msgEl.textContent   = data.error || 'Credenciais inválidas.';
          errEl.style.display = 'flex';
        }
      } catch {
        msgEl.textContent   = 'Erro de conexão.';
        errEl.style.display = 'flex';
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Entrar';
      }
    }

    btn.addEventListener('click', doLogin);
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    document.getElementById('username').focus();
  </script>
</body>
</html>
