<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificados A1</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:              #f6f8fa;
      --surface:         #ffffff;
      --surface2:        #f0f2f5;
      --border:          #d8dde6;
      --border-subtle:   #e8ebf0;
      --text:            #0d1117;
      --text-2:          #444c56;
      --muted:           #768390;
      --accent:          #0969da;
      --accent-subtle:   #ddf4ff;
      --accent-border:   #54aeff;
      --success:         #1a7f37;
      --success-subtle:  #dafbe1;
      --success-border:  #4ac26b;
      --attention:       #9a6700;
      --attention-subtle:#fff8c5;
      --attention-border:#d4a72c;
      --severe:          #bc4c00;
      --severe-subtle:   #fff1e5;
      --severe-border:   #fb8f44;
      --danger:          #cf222e;
      --danger-subtle:   #ffebe9;
      --danger-border:   #ff8182;
      --radius-sm:       6px;
      --radius:          8px;
      --radius-md:       10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
    }

    svg { display: inline-block; vertical-align: middle; flex-shrink: 0; }

    /* ── Nav ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      height: 52px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text);
      text-decoration: none;
    }

    .nav-brand-icon {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-user {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.8rem;
      color: var(--text-2);
      padding: 4px 8px;
      border-radius: var(--radius-sm);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid;
      transition: all .15s;
      line-height: 1;
      height: 30px;
      white-space: nowrap;
    }

    .btn-default {
      background: var(--surface);
      border-color: var(--border);
      color: var(--text-2);
    }
    .btn-default:hover { background: var(--surface2); border-color: var(--border); color: var(--text); }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: #0860ca; }
    .btn-primary:disabled { opacity: .55; cursor: default; }

    .btn-danger {
      background: var(--surface);
      border-color: var(--border);
      color: var(--muted);
    }
    .btn-danger:hover { background: var(--danger-subtle); border-color: var(--danger-border); color: var(--danger); }

    .btn-icon {
      width: 28px; height: 28px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      background: transparent;
      cursor: pointer;
      color: var(--muted);
      transition: all .15s;
    }
    .btn-icon:hover { background: var(--surface2); border-color: var(--border); color: var(--text); }
    .btn-icon.danger:hover { background: var(--danger-subtle); border-color: var(--danger-border); color: var(--danger); }

    /* ── Layout ── */
    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 20px 60px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .section-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── Stat cards ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    @media (max-width: 700px) { .stat-grid { grid-template-columns: repeat(2,1fr); } }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .stat-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .stat-card-label {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 500;
    }

    .stat-icon {
      width: 28px; height: 28px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .si-blue   { background: var(--accent-subtle);    color: var(--accent); }
    .si-green  { background: var(--success-subtle);   color: var(--success); }
    .si-yellow { background: var(--attention-subtle); color: var(--attention); }
    .si-red    { background: var(--danger-subtle);    color: var(--danger); }

    .stat-value {
      font-size: 1.75rem;
      font-weight: 700;
      line-height: 1;
      color: var(--text);
    }

    /* ── Alert panels ── */
    .alert-panels { display: flex; flex-direction: column; gap: 8px; }

    .alert-panel {
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .alert-panel-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      cursor: pointer;
      user-select: none;
    }

    .alert-strip {
      width: 3px;
      border-radius: 4px;
      align-self: stretch;
      flex-shrink: 0;
    }
    .strip-danger  { background: var(--danger); }
    .strip-severe  { background: var(--severe); }
    .strip-attention { background: var(--attention); }

    .alert-panel-label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-2);
      flex: 1;
    }

    .count-pill {
      padding: 1px 7px;
      border-radius: 20px;
      font-size: 0.71rem;
      font-weight: 700;
    }
    .cp-danger     { background: var(--danger-subtle);    color: var(--danger);    border: 1px solid var(--danger-border); }
    .cp-severe     { background: var(--severe-subtle);    color: var(--severe);    border: 1px solid var(--severe-border); }
    .cp-attention  { background: var(--attention-subtle); color: var(--attention); border: 1px solid var(--attention-border); }

    .alert-chevron {
      color: var(--muted);
      transition: transform .2s;
      flex-shrink: 0;
    }
    .alert-panel.open .alert-chevron { transform: rotate(180deg); }

    .alert-body {
      display: none;
      border-top: 1px solid var(--border-subtle);
    }
    .alert-panel.open .alert-body { display: block; }

    .alert-table { width: 100%; border-collapse: collapse; }

    .alert-table td {
      padding: 8px 14px;
      font-size: 0.8rem;
      border-bottom: 1px solid var(--border-subtle);
      vertical-align: middle;
    }
    .alert-table tr:last-child td { border-bottom: none; }
    .alert-table tr:hover td { background: var(--bg); }

    .alert-name { font-weight: 600; color: var(--text); }
    .alert-file { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }

    .days-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .db-danger    { background: var(--danger-subtle);    color: var(--danger);    border: 1px solid var(--danger-border); }
    .db-severe    { background: var(--severe-subtle);    color: var(--severe);    border: 1px solid var(--severe-border); }
    .db-attention { background: var(--attention-subtle); color: var(--attention); border: 1px solid var(--attention-border); }

    .alert-empty-row td { color: var(--muted); font-style: italic; padding: 12px 14px; }

    /* ── Notify result ── */
    .notify-panel {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .notify-panel.visible { display: block; }

    .notify-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border-subtle);
      background: var(--surface2);
    }

    .notify-panel-head span {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-2);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .notify-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 0.8rem;
    }
    .notify-item:last-child { border-bottom: none; }
    .notify-item:hover { background: var(--bg); }

    .notify-status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .nd-ok  { background: var(--success); }
    .nd-err { background: var(--danger); }

    .notify-info { flex: 1; }
    .notify-name { font-weight: 600; color: var(--text); }
    .notify-meta { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }

    .notify-tag {
      font-size: 0.71rem;
      font-weight: 600;
      padding: 1px 7px;
      border-radius: 20px;
    }
    .nt-ok  { background: var(--success-subtle);  color: var(--success); border: 1px solid var(--success-border); }
    .nt-err { background: var(--danger-subtle);   color: var(--danger);  border: 1px solid var(--danger-border); }

    .notify-empty-msg {
      padding: 16px 14px;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }

    /* ── Upload ── */
    .dropzone {
      background: var(--surface);
      border: 2px dashed var(--border);
      border-radius: var(--radius-md);
      padding: 36px 24px;
      text-align: center;
      cursor: pointer;
      position: relative;
      transition: border-color .15s, background .15s;
    }
    .dropzone.dragover { border-color: var(--accent); background: var(--accent-subtle); }
    .dropzone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .dz-icon {
      width: 40px; height: 40px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      color: var(--muted);
    }
    .dz-title { font-size: 0.88rem; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .dz-sub   { font-size: 0.78rem; color: var(--muted); }
    .dz-sub span {
      color: var(--accent);
      font-weight: 500;
      pointer-events: none;
    }

    .upload-log {
      display: none;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .upload-log-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 14px;
      font-size: 0.8rem;
      border-bottom: 1px solid var(--border-subtle);
    }
    .upload-log-item:last-child { border-bottom: none; }
    .ul-icon { color: var(--muted); flex-shrink: 0; }
    .ul-name { flex: 1; color: var(--text); font-weight: 500; }
    .ul-result { font-size: 0.75rem; color: var(--muted); }
    .ul-result.ok  { color: var(--success); }
    .ul-result.err { color: var(--danger); }

    /* ── Filter bar ── */
    .filter-bar {
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .filter-field {
      position: relative;
      display: flex;
      align-items: center;
    }

    .filter-field-icon {
      position: absolute;
      left: 8px;
      color: var(--muted);
      pointer-events: none;
    }

    .filter-input {
      height: 28px;
      padding: 0 10px 0 30px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .filter-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(9,105,218,.12); }
    .filter-input::placeholder { color: var(--muted); }

    #searchInput { width: 210px; }

    .filter-input-date {
      height: 28px;
      padding: 0 8px 0 30px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .15s;
      width: 140px;
    }
    .filter-input-date:focus { border-color: var(--accent); }

    .filter-divider { width: 1px; height: 18px; background: var(--border); }

    .qfilters { display: flex; gap: 4px; flex-wrap: wrap; }

    .qbtn {
      height: 26px;
      padding: 0 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-2);
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }
    .qbtn:hover { border-color: var(--border); background: var(--surface2); }
    .qbtn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
    .qbtn.q45.active  { background: var(--attention); border-color: var(--attention); }
    .qbtn.q30.active  { background: var(--severe);    border-color: var(--severe); }
    .qbtn.q15.active  { background: var(--danger);    border-color: var(--danger); }
    .qbtn.qexp.active { background: #57606a;           border-color: #57606a; }

    .filter-spacer { flex: 1; }

    /* ── Table ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .table-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .table-toolbar-left {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
    }

    .table-count {
      font-weight: 400;
      color: var(--muted);
      font-size: 0.78rem;
      margin-left: 6px;
    }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      padding: 8px 14px;
      text-align: left;
      font-size: 0.71rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--muted);
      background: var(--surface2);
      border-bottom: 1px solid var(--border-subtle);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    thead th:hover { color: var(--text-2); }
    thead th.sorted { color: var(--accent); }

    .sort-icon { margin-left: 3px; opacity: .6; }

    tbody tr { border-bottom: 1px solid var(--border-subtle); transition: background .08s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg); }

    td { padding: 10px 14px; vertical-align: middle; }

    .td-name    { font-weight: 600; font-size: 0.82rem; color: var(--text); }
    .td-org     { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }
    .td-cnpj    { font-size: 0.72rem; color: var(--muted); font-family: 'SF Mono', 'Fira Code', monospace; margin-top: 1px; }
    .td-file    { font-size: 0.72rem; color: var(--muted); font-family: 'SF Mono', 'Fira Code', monospace; margin-top: 2px; }
    .td-pass    { font-size: 0.72rem; color: #d97706; font-family: 'SF Mono', 'Fira Code', monospace; margin-top: 2px; }
    .td-date    { font-size: 0.8rem; color: var(--text-2); }
    .td-actions { display: flex; gap: 4px; }

    .status-dot-wrap {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      font-weight: 500;
    }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .sd-success { background: var(--success); }
    .sd-attention { background: var(--attention); }
    .sd-severe  { background: var(--severe); }
    .sd-danger  { background: var(--danger); }
    .sd-gray    { background: var(--muted); }

    .status-color-success  { color: var(--success); }
    .status-color-attention { color: var(--attention); }
    .status-color-severe   { color: var(--severe); }
    .status-color-danger   { color: var(--danger); }
    .status-color-gray     { color: var(--muted); }

    .prog-wrap { display: flex; flex-direction: column; gap: 3px; }
    .prog-val  { font-size: 0.8rem; font-weight: 500; }
    .prog-bar  { height: 3px; background: var(--border); border-radius: 3px; width: 64px; }
    .prog-fill { height: 100%; border-radius: 3px; }
    .pf-success  { background: var(--success); }
    .pf-attention { background: var(--attention); }
    .pf-severe   { background: var(--severe); }
    .pf-danger   { background: var(--danger); }

    .empty-state {
      padding: 48px 20px;
      text-align: center;
      color: var(--muted);
    }

    .empty-icon {
      width: 40px; height: 40px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      color: var(--muted);
    }

    .empty-state p { font-size: 0.82rem; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 500;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 20px 22px;
      width: 100%;
      max-width: 390px;
      box-shadow: 0 8px 32px rgba(0,0,0,.12), 0 0 0 1px rgba(0,0,0,.04);
    }

    .modal-title {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .modal-sub {
      font-size: 0.76rem;
      color: var(--muted);
      margin-bottom: 16px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      word-break: break-all;
    }

    .modal label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 5px;
    }

    .modal input[type="password"] {
      width: 100%;
      height: 32px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .modal input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(9,105,218,.12);
    }

    .modal-err  { font-size: 0.75rem; color: var(--danger); margin-top: 5px; min-height: 14px; }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }

    @media (max-width: 640px) {
      .filter-bar { flex-direction: column; align-items: stretch; }
      #searchInput { width: 100%; }
      .filter-input-date { width: 100%; }
      td:nth-child(3), th:nth-child(3) { display: none; }
      .stat-grid { grid-template-columns: repeat(2,1fr); }
    }
  </style>
</head>
<body>

<!-- Nav -->
<nav>
  <div class="nav-brand">
    <div class="nav-brand-icon">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    </div>
    Certificados A1
  </div>

  <div class="nav-right">
    <button class="btn btn-default" id="btnNotify" onclick="doNotify()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      Disparar notificações
    </button>

    <div class="nav-user">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      {{ login_user }}
    </div>

<script>
  // ── SVG Icons (para uso em HTML dinâmico) ──────────────────────────────────
  const ic = {
    file:     `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>`,
    download: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
    trash:    `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`,
    chevron:  `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`,
    spin:     `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:spin .8s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>`,
  };

  const style = document.createElement('style');
  style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
  document.head.appendChild(style);

  // ── State ─────────────────────────────────────────────────────────────────
  let currentQuick = '';
  let sortCol = 'owner_name';
  let sortAsc = true;
  let allCerts = [];

  // ── Init ──────────────────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    loadDashboard();
    loadCerts();
    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') loadCerts();
    });
  });

  // ── Logout ────────────────────────────────────────────────────────────────
  async function doLogout() {
    await fetch('/logout', { method: 'POST' });
    location.href = '/';
  }

  // ── Notify ────────────────────────────────────────────────────────────────
  async function doNotify() {
    const btn = document.getElementById('btnNotify');
    btn.disabled = true;
    btn.innerHTML = ic.spin + ' Enviando…';
    try {
      const res  = await fetch('/api/notify', { method: 'POST' });
      const data = await res.json();
      renderNotifyResults(data.error ? [] : data.results, data.error);
    } catch {
      renderNotifyResults([], 'Erro de conexão.');
    } finally {
      btn.disabled = false;
      btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg> Disparar notificações`;
    }
  }

  function renderNotifyResults(results, error) {
    const panel = document.getElementById('notifyPanel');
    const list  = document.getElementById('notifyList');
    panel.classList.add('visible');

    if (error) {
      list.innerHTML = `<div class="notify-empty-msg">${esc(error)}</div>`;
      return;
    }
    if (!results.length) {
      list.innerHTML = `<div class="notify-empty-msg">Nenhuma notificação nova — todos os certificados já foram notificados ou não há vencimentos nos próximos 30 dias.</div>`;
      return;
    }

    const thr = { 7: '7 dias', 15: '15 dias', 30: '30 dias' };
    list.innerHTML = results.map(r => `
      <div class="notify-item">
        <span class="notify-status-dot ${r.success ? 'nd-ok' : 'nd-err'}"></span>
        <div class="notify-info">
          <div class="notify-name">${esc(r.cert)}</div>
          <div class="notify-meta">CNPJ: ${esc(r.cnpj || '—')} · Limiar: ${thr[r.threshold] || r.threshold + 'd'}${!r.success ? ' · ' + esc(r.msg) : ''}</div>
        </div>
        <span class="notify-tag ${r.success ? 'nt-ok' : 'nt-err'}">${r.success ? 'Enviado' : 'Falhou'}</span>
      </div>`).join('');
  }

  // ── Dashboard ─────────────────────────────────────────────────────────────
  async function loadDashboard() {
    const res  = await fetch('/api/dashboard');
    const data = await res.json();

    document.getElementById('sTotal').textContent   = data.total;
    document.getElementById('sValid').textContent   = data.valid;
    document.getElementById('sWarn').textContent    = data.expiring_30_count;
    document.getElementById('sExpired').textContent = data.expired;

    const panels = [
      { key: 'expiring_7',  strip: 'strip-danger',    cp: 'cp-danger',    label: 'Crítico — vencendo em até 7 dias',   db: 'db-danger' },
      { key: 'expiring_15', strip: 'strip-severe',    cp: 'cp-severe',    label: 'Atenção — vencendo em até 15 dias',  db: 'db-severe' },
      { key: 'expiring_30', strip: 'strip-attention', cp: 'cp-attention', label: 'Aviso — vencendo em até 30 dias',    db: 'db-attention' },
    ];

    document.getElementById('alertPanels').innerHTML = panels.map(p => {
      const items = data[p.key];
      const rows = items.length
        ? items.map(c => `
            <tr>
              <td>
                <div class="alert-name">${esc(c.owner_name || '—')}</div>
                <div class="alert-file">${esc(c.filename)}</div>
              </td>
              <td>${fmtDate(c.not_after)}</td>
              <td><span class="days-badge ${p.db}">${c.dias_restantes === 0 ? 'Hoje' : c.dias_restantes + 'd'}</span></td>
            </tr>`).join('')
        : `<tr class="alert-empty-row"><td colspan="3">Nenhum certificado neste prazo.</td></tr>`;

      return `
        <div class="alert-panel" id="ap-${p.key}">
          <div class="alert-panel-head" onclick="togglePanel('ap-${p.key}')">
            <span class="alert-strip ${p.strip}"></span>
            <span class="alert-panel-label">${p.label}</span>
            <span class="count-pill ${p.cp}">${items.length}</span>
            <span class="alert-chevron">${ic.chevron}</span>
          </div>
          <div class="alert-body">
            <table class="alert-table"><tbody>${rows}</tbody></table>
          </div>
        </div>`;
    }).join('');

    panels.forEach(p => {
      if (data[p.key].length > 0) document.getElementById(`ap-${p.key}`)?.classList.add('open');
    });
  }

  function togglePanel(id) { document.getElementById(id)?.classList.toggle('open'); }

  // ── Quick filter ──────────────────────────────────────────────────────────
  function setQuick(btn, val) {
    document.querySelectorAll('.qbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentQuick = val;
    if (val) {
      document.getElementById('dateFrom').value = '';
      document.getElementById('dateTo').value   = '';
    }
    loadCerts();
  }

  // ── Load certificates ─────────────────────────────────────────────────────
  async function loadCerts() {
    const params = new URLSearchParams();
    const search = document.getElementById('searchInput').value.trim();
    const from   = document.getElementById('dateFrom').value;
    const to     = document.getElementById('dateTo').value;
    if (search)       params.set('search',    search);
    if (currentQuick) params.set('quick',     currentQuick);
    if (!currentQuick && from) params.set('date_from', from);
    if (!currentQuick && to)   params.set('date_to',   to);
    const res = await fetch('/api/certificates?' + params);
    allCerts  = await res.json();
    renderTable();
  }

  // ── Render table ──────────────────────────────────────────────────────────
  function renderTable() {
    const sorted = [...allCerts].sort((a, b) => {
      let va = a[sortCol] ?? '', vb = b[sortCol] ?? '';
      return sortAsc ? (va < vb ? -1 : va > vb ? 1 : 0)
                     : (va > vb ? -1 : va < vb ? 1 : 0);
    });

    const cnt = sorted.length;
    document.getElementById('tableCount').textContent = cnt === 1 ? '· 1 certificado' : `· ${cnt} certificados`;

    if (!cnt) {
      document.getElementById('tableBody').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">${ic.file}</div>
          <p>Nenhum certificado encontrado.</p>
        </div>`;
      return;
    }

    const cols = [
      { key: 'owner_name',     label: 'Titular'         },
      { key: 'not_before',     label: 'Emitido em'      },
      { key: 'not_after',      label: 'Vence em'        },
      { key: 'dias_restantes', label: 'Dias restantes'  },
      { key: '_status',        label: 'Status'          },
      { key: '_actions',       label: ''                },
    ];

    const thHTML = cols.map(c => {
      if (c.key.startsWith('_')) return `<th style="width:1%">${c.label}</th>`;
      const arrow = sortCol === c.key
        ? `<span class="sort-icon">${sortAsc ? '↑' : '↓'}</span>` : '';
      return `<th class="${sortCol === c.key ? 'sorted' : ''}" onclick="setSort('${c.key}')">${c.label}${arrow}</th>`;
    }).join('');

    const tbHTML = sorted.map(c => {
      const { dotCls, colorCls, label, progCls } = classify(c.dias_restantes);
      const pct = progPct(c);

      const diasHTML = c.dias_restantes != null ? `
        <div class="prog-wrap">
          <span class="prog-val ${colorCls}">${
            c.dias_restantes < 0  ? `Vencido há ${Math.abs(c.dias_restantes)}d` :
            c.dias_restantes === 0 ? 'Hoje' :
            c.dias_restantes + ' dias'}</span>
          <div class="prog-bar"><div class="prog-fill ${progCls}" style="width:${pct}%"></div></div>
        </div>` : '<span style="color:var(--muted)">—</span>';

      return `<tr>
        <td>
          <div class="td-name">${esc(c.owner_name || '—')}</div>
          ${c.organization    ? `<div class="td-org">${esc(c.organization)}</div>` : ''}
          ${c.cnpj            ? `<div class="td-cnpj">${esc(c.cnpj)}</div>` : ''}
          <div class="td-file">${esc(c.filename)}</div>
          ${c.cert_password   ? `<div class="td-pass">🔑 ${esc(c.cert_password)}</div>` : ''}
        </td>
        <td class="td-date">${fmtDate(c.not_before)}</td>
        <td class="td-date">${fmtDate(c.not_after)}</td>
        <td>${diasHTML}</td>
        <td>
          <div class="status-dot-wrap">
            <span class="status-dot ${dotCls}"></span>
            <span class="${colorCls}">${label}</span>
          </div>
        </td>
        <td>
          <div class="td-actions">
            <a class="btn btn-default" href="/api/certificates/${c.id}/download" title="Baixar"
               style="padding:0 8px;height:26px;font-size:0.75rem;text-decoration:none">
              ${ic.download} Baixar
            </a>
            <button class="btn-icon danger" title="Excluir"
              onclick="deleteCert(${c.id},'${esc(c.owner_name || c.filename)}')">
              ${ic.trash}
            </button>
          </div>
        </td>
      </tr>`;
    }).join('');

    document.getElementById('tableBody').innerHTML =
      `<table><thead><tr>${thHTML}</tr></thead><tbody>${tbHTML}</tbody></table>`;
  }

  function setSort(col) {
    sortAsc = (sortCol === col) ? !sortAsc : true;
    sortCol = col;
    renderTable();
  }

  function classify(dias) {
    if (dias == null) return { dotCls: 'sd-gray',      colorCls: 'status-color-gray',      label: '—',        progCls: 'pf-success' };
    if (dias < 0)     return { dotCls: 'sd-gray',      colorCls: 'status-color-gray',      label: 'Vencido',  progCls: 'pf-danger'  };
    if (dias <= 15)   return { dotCls: 'sd-danger',    colorCls: 'status-color-danger',    label: 'Crítico',  progCls: 'pf-danger'  };
    if (dias <= 30)   return { dotCls: 'sd-severe',    colorCls: 'status-color-severe',    label: 'Atenção',  progCls: 'pf-severe'  };
    if (dias <= 45)   return { dotCls: 'sd-attention', colorCls: 'status-color-attention', label: 'Aviso',    progCls: 'pf-attention' };
    return               { dotCls: 'sd-success',   colorCls: 'status-color-success',   label: 'Válido',   progCls: 'pf-success' };
  }

  function progPct(c) {
    if (!c.not_before || !c.not_after) return 0;
    const total = new Date(c.not_after) - new Date(c.not_before);
    const used  = Date.now() - new Date(c.not_before);
    return Math.min(100, Math.max(0, Math.round(used / total * 100)));
  }

  // ── Delete ────────────────────────────────────────────────────────────────
  async function deleteCert(id, name) {
    if (!confirm(`Remover o certificado de "${name}"?\n\nEsta ação não pode ser desfeita.`)) return;
    await fetch(`/api/certificates/${id}`, { method: 'DELETE' });
    loadDashboard();
    loadCerts();
  }

  // ── Upload ────────────────────────────────────────────────────────────────
  const dropzone  = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');

  dropzone.addEventListener('dragover',  e => { e.preventDefault(); dropzone.classList.add('dragover'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('dragover');
    handleFiles([...e.dataTransfer.files]);
  });
  fileInput.addEventListener('change', () => { handleFiles([...fileInput.files]); fileInput.value = ''; });

  async function handleFiles(files) {
    const valid = files.filter(f => /\.(pfx|p12)$/i.test(f.name));
    if (!valid.length) return;

    const logEl = document.getElementById('uploadLog');
    logEl.innerHTML = '';
    logEl.style.display = 'flex';

    valid.forEach(f => {
      logEl.insertAdjacentHTML('beforeend', `
        <div class="upload-log-item" id="ul-${CSS.escape(f.name)}">
          <span class="ul-icon">${ic.file}</span>
          <span class="ul-name">${esc(f.name)}</span>
          <span class="ul-result">${ic.spin}</span>
        </div>`);
    });

    const fd = new FormData();
    valid.forEach(f => fd.append('files', f));
    const res     = await fetch('/api/upload', { method: 'POST', body: fd });
    const results = await res.json();

    const needsPass = [];
    for (const r of results) {
      if (r.needs_password) needsPass.push({ filename: r.filename, file: valid.find(f => f.name === r.filename) });
      else markUL(r.filename, r.success);
    }

    for (const item of needsPass) {
      const pw = await askPassword(item.filename);
      if (pw === null) { markUL(item.filename, false, 'Ignorado'); continue; }
      const fd2 = new FormData();
      fd2.append('files', item.file);
      fd2.append('password', pw);
      const [r2] = await (await fetch('/api/upload', { method: 'POST', body: fd2 })).json();
      markUL(item.filename, r2?.success, r2?.needs_password ? 'Senha incorreta' : null);
    }

    loadDashboard();
    loadCerts();
  }

  function markUL(filename, ok, msg) {
    const row = document.getElementById(`ul-${CSS.escape(filename)}`);
    if (!row) return;
    const res = row.querySelector('.ul-result');
    res.className = `ul-result ${ok ? 'ok' : 'err'}`;
    res.textContent = ok ? 'Adicionado' : (msg || 'Erro');
  }

  // ── Password modal ────────────────────────────────────────────────────────
  function askPassword(filename) {
    return new Promise(resolve => {
      const overlay = document.getElementById('passModal');
      document.getElementById('modalFilename').textContent = filename;
      document.getElementById('modalPass').value = '';
      document.getElementById('modalErr').textContent = '';
      overlay.classList.add('active');
      document.getElementById('modalPass').focus();

      const confirm = () => { off(); overlay.classList.remove('active'); resolve(document.getElementById('modalPass').value); };
      const skip    = () => { off(); overlay.classList.remove('active'); resolve(null); };
      const onKey   = e => { if (e.key === 'Enter') confirm(); };

      document.getElementById('btnConfirm').addEventListener('click', confirm);
      document.getElementById('btnSkip').addEventListener('click', skip);
      document.getElementById('modalPass').addEventListener('keydown', onKey);

      function off() {
        document.getElementById('btnConfirm').removeEventListener('click', confirm);
        document.getElementById('btnSkip').removeEventListener('click', skip);
        document.getElementById('modalPass').removeEventListener('keydown', onKey);
      }
    });
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function fmtDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric' });
  }

  function esc(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
